name: _callable e2e tests

on:
  workflow_call:
    inputs:
      run_claude:
        type: boolean
        required: true
      run_codex:
        type: boolean
        required: true
      run_gemini:
        type: boolean
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      CODEX_AUTH_JSON:
        required: false
      GEMINI_CREDENTIALS:
        required: false

jobs:
  test-e2e-claude:
    if: ${{ inputs.run_claude }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: ./.github/actions/run-provider-session
        with:
          provider: claude
          command: pnpm test:e2e:claude
          install-cli: 'true'
          mode: raw
          bypass-permissions: 'true'
          save-session: 'true'
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  test-e2e-codex:
    if: ${{ inputs.run_codex }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: ./.github/actions/run-provider-session
        with:
          provider: codex
          command: pnpm test:e2e:codex
          install-cli: 'true'
          mode: raw
          bypass-permissions: 'true'
          save-session: 'true'
          codex-auth-json: ${{ secrets.CODEX_AUTH_JSON }}

  test-e2e-gemini:
    if: ${{ inputs.run_gemini }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: ./.github/actions/run-provider-session
        with:
          provider: gemini
          command: pnpm test:e2e:gemini
          install-cli: 'true'
          mode: raw
          bypass-permissions: 'true'
          save-session: 'true'
          gemini-credentials: ${{ secrets.GEMINI_CREDENTIALS }}
