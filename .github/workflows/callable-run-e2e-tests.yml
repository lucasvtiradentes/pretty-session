name: E2E Tests

on:
  workflow_call:
    inputs:
      run_claude:
        type: boolean
        required: true
      run_codex:
        type: boolean
        required: true
    secrets:
      TURBO_TOKEN:
        required: true
      TURBO_TEAM:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CODEX_AUTH_JSON:
        required: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  test-e2e-claude:
    if: ${{ inputs.run_claude }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Run Claude e2e tests
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: pnpm --filter @pretty-sessions/cli test:e2e:claude

      - name: Upload Claude session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: ~/.claude/projects/
          retention-days: 7

  test-e2e-codex:
    if: ${{ inputs.run_codex }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Setup Codex auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: mkdir -p ~/.codex && echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json

      - name: Run Codex e2e tests
        timeout-minutes: 10
        run: pnpm --filter @pretty-sessions/cli test:e2e:codex

      - name: Upload Codex session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-session-logs
          path: ~/.codex/sessions/
          retention-days: 7
