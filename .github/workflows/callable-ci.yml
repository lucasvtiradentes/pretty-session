name: CI

on:
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        required: true
      run_e2e_tests:
        type: boolean
        required: true
    secrets:
      TURBO_TOKEN:
        required: true
      TURBO_TEAM:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - run: pnpm build
      - run: pnpm check
      - run: pnpm knip

  test:
    if: ${{ inputs.run_tests }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - run: pnpm turbo test

  test-e2e:
    if: ${{ inputs.run_e2e_tests }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Run e2e tests
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: pnpm --filter @pretty-sessions/cli test:e2e

      - name: Upload session logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-session-logs
          path: ~/.claude/projects/
          retention-days: 7
