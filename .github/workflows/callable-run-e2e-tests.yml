name: _callable e2e tests

on:
  workflow_call:
    inputs:
      run_claude:
        type: boolean
        required: true
      run_codex:
        type: boolean
        required: true
      run_gemini:
        type: boolean
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      CODEX_AUTH_JSON:
        required: false
      GEMINI_CREDENTIALS:
        required: false

jobs:
  test-e2e-claude:
    if: ${{ inputs.run_claude }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: lucasvtiradentes/setup-ai-provider@v0
        with:
          provider: claude
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          artifact-name: claude-session-raw-files
          upload-session-files: 'true'
      - name: Run Claude e2e tests
        run: pnpm test:e2e:claude

  test-e2e-codex:
    if: ${{ inputs.run_codex }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: lucasvtiradentes/setup-ai-provider@v0
        with:
          provider: codex
          codex-auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          artifact-name: codex-session-raw-files
          upload-session-files: 'true'
      - name: Run Codex e2e tests
        run: pnpm test:e2e:codex

  test-e2e-gemini:
    if: ${{ inputs.run_gemini }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: lucasvtiradentes/setup-ai-provider@v0
        with:
          provider: gemini
          gemini-auth-json: ${{ secrets.GEMINI_CREDENTIALS }}
          artifact-name: gemini-session-raw-files
          upload-session-files: 'true'
      - name: Run Gemini e2e tests
        run: pnpm test:e2e:gemini
