name: Main Branch and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/callable-ci.yml
    with:
      run_lint: true
      run_build: true
      run_test: true
      run_e2e_tests: false

  release:
    name: Release PR
    needs: [ci]
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-and-install

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_npm:
    name: Release NPM Package
    needs: [ci, release]
    if: needs.release.outputs.has_changesets == 'false' && needs.ci.outputs.should_release_npm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-and-install

      - uses: ./.github/actions/release-npm
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
