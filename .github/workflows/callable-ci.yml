name: _callable CI

on:
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        required: true
      run_e2e_tests:
        type: boolean
        required: true
    secrets:
      TURBO_TOKEN:
        required: true
      TURBO_TEAM:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CODEX_AUTH_JSON:
        required: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - run: pnpm build
      - run: pnpm check
      - run: pnpm knip

  test:
    if: ${{ inputs.run_tests }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - run: pnpm turbo test

  test-e2e:
    if: ${{ inputs.run_e2e_tests }}
    needs: build
    uses: ./.github/workflows/callable-run-e2e-tests.yml
    with:
      run_claude: true
      run_codex: true
    secrets: inherit
