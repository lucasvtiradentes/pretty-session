name: Manual Showcase

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider to run
        type: choice
        required: true
        default: claude
        options:
          - claude
          - codex
          - gemini

env:
  SHOWCASE_PROMPT: Read the relevant project files and explain what this project does.

jobs:
  without-pretty-session:
    name: Without Pretty Session
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: lucasvtiradentes/setup-ai-provider@v0
        with:
          provider: ${{ inputs.provider }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          codex-auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          gemini-auth-json: ${{ secrets.GEMINI_CREDENTIALS }}
      - name: Run Claude Code
        if: ${{ inputs.provider == 'claude' }}
        run: claude -p "${{ env.SHOWCASE_PROMPT }}" --print --verbose --dangerously-skip-permissions --output-format stream-json
      - name: Run Codex
        if: ${{ inputs.provider == 'codex' }}
        run: codex exec "${{ env.SHOWCASE_PROMPT }}" --json --dangerously-bypass-approvals-and-sandbox
      - name: Run Gemini
        if: ${{ inputs.provider == 'gemini' }}
        run: gemini -p "${{ env.SHOWCASE_PROMPT }}" --output-format stream-json --yolo

  with-pretty-session:
    name: With Pretty Session
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-and-install
      - uses: lucasvtiradentes/setup-ai-provider@v0
        with:
          provider: ${{ inputs.provider }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          codex-auth-json: ${{ secrets.CODEX_AUTH_JSON }}
          gemini-auth-json: ${{ secrets.GEMINI_CREDENTIALS }}
      - name: Install Pretty Session
        run: npm install --global pretty-session
      - name: Run Claude Code with Pretty Session
        if: ${{ inputs.provider == 'claude' }}
        run: claude -p "${{ env.SHOWCASE_PROMPT }}" --print --verbose --dangerously-skip-permissions --output-format stream-json | pts parse claude
      - name: Run Codex with Pretty Session
        if: ${{ inputs.provider == 'codex' }}
        run: codex exec "${{ env.SHOWCASE_PROMPT }}" --json --dangerously-bypass-approvals-and-sandbox | pts parse codex
      - name: Run Gemini with Pretty Session
        if: ${{ inputs.provider == 'gemini' }}
        run: gemini -p "${{ env.SHOWCASE_PROMPT }}" --output-format stream-json --yolo | pts parse gemini
