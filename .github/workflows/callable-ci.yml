name: _callable ci

on:
  workflow_call:
    inputs:
      run_lint:
        description: Run check
        type: boolean
        required: true
      run_build:
        description: Run typecheck and build
        type: boolean
        required: true
      run_test:
        description: Run tests
        type: boolean
        required: false
        default: false
      run_e2e_tests:
        description: Run e2e tests
        type: boolean
        required: false
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      CODEX_AUTH_JSON:
        required: false
      GEMINI_CREDENTIALS:
        required: false
    outputs:
      should_release_npm:
        description: Whether the package version changed and release tag is missing
        value: ${{ jobs.check_version.outputs.should_release_npm }}

jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      should_release_npm: ${{ steps.check.outputs.should_release_npm }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-and-install
        with:
          skip-install: 'true'

      - name: Check package version
        id: check
        run: bash .github/scripts/check-version-bump.sh

  check:
    if: inputs.run_lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-install

      - name: Run check
        run: pnpm run check

      - name: Check generated docs
        run: pnpm run check:docs

      - name: Run knip
        run: pnpm run knip

  build:
    if: inputs.run_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-install

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run build
        run: pnpm run build
        env:
          CI: true

  test:
    needs: [check, build]
    if: inputs.run_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-install

      - name: Run tests
        run: pnpm run test

  test-e2e:
    needs: [check, build]
    if: inputs.run_e2e_tests
    uses: ./.github/workflows/callable-run-e2e-tests.yml
    with:
      run_claude: true
      run_codex: true
      run_gemini: true
    secrets: inherit
